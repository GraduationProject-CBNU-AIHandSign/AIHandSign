<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 수어 학습 플랫폼</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Arial", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: radial-gradient(circle at top, #e0f2fe 0%, #f8fafc 35%, #eef2ff 70%, #ffffff 100%);
      overflow-x: hidden;
      color: #0f172a;
    }

    .background-blur {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .blur-1, .blur-2, .blur-3 {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
    }

    .blur-1 { top: 70px; left: 40px; width: 180px; height: 180px; background: rgba(125, 211, 252, 0.3); }
    .blur-2 { right: 40px; top: 150px; width: 220px; height: 220px; background: rgba(165, 180, 252, 0.25); }
    .blur-3 { left: 30%; bottom: 100px; width: 250px; height: 250px; background: rgba(224, 231, 255, 0.4); }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 32px;
      padding: 60px 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      width: 100%;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      background: #eff6ff;
      color: #2563eb;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 24px;
      background: linear-gradient(to right, #1e293b, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .description {
      font-size: 18px;
      line-height: 1.6;
      color: #64748b;
      margin-bottom: 48px;
    }

    .logo-area {
      position: relative;
      margin-bottom: 60px;
    }

    .logo-card {
      background: white;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-circle {
      width: 80px;
      height: 80px;
      background: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: white;
    }

    .logo-title { font-weight: 700; font-size: 20px; }
    .logo-subtitle { font-size: 14px; color: #94a3b8; }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
    }

    .button-card {
      text-decoration: none;
      background: white;
      padding: 30px 20px;
      border-radius: 24px;
      border: 1px solid #f1f5f9;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .button-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(59, 130, 246, 0.1);
      border-color: #3b82f6;
    }

    .button-card.dark { background: #0f172a; color: white; border: none; }
    .button-card.dark .button-text { color: #94a3b8; }

    .icon-box { font-size: 32px; }
    .button-title { font-weight: 700; font-size: 18px; }
    .button-text { font-size: 14px; color: #64748b; line-height: 1.4; }

    @media (max-width: 768px) {
      .button-grid { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="background-blur">
    <div class="blur-1"></div>
    <div class="blur-2"></div>
    <div class="blur-3"></div>
  </div>

  <div class="wrapper">
    <div class="card">
      <div class="badge">✨ 손짓을 이해하고, 소통을 연결합니다</div>

      <h1>AI 수어 학습 플랫폼</h1>

      <div class="description">
        <p>수어 학습과 실시간 번역을 한 곳에서 경험할 수 있는 웹 서비스입니다.</p>
        <p>누구나 더 쉽게 배우고, 더 자연스럽게 소통할 수 있도록 돕습니다.</p>
      </div>

      <div class="logo-area">
        <div class="logo-card">
          <div class="logo-circle">🤟</div>
          <div class="logo-title">Sign Language</div>
          <div class="logo-subtitle">Education & Translation</div>
        </div>
      </div>

      <div class="button-grid">
        <a class="button-card dark" href="education.html">
          <div class="icon-box">📘</div>
          <div class="button-title">교육</div>
          <div class="button-text">기초 수어 표현부터 단계별로 배우는 체계적인 커리큘럼을 제공합니다.</div>
        </a>

        <a class="button-card" href="#">
          <div class="icon-box">📷</div>
          <div class="button-title">번역</div>
          <div class="button-text">카메라를 통해 수어를 실시간으로 분석하여 텍스트로 변환해 줍니다.</div>
        </a>

        <a class="button-card" href="http://localhost:8501" target="_blank">
          <div class="icon-box">💬</div>
          <div class="button-title">챗봇</div>
          <div class="button-text">수어에 대한 궁금증을 AI 챗봇에게 실시간으로 물어보세요.</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
